display_name: Cold B2B Email RU
short_description: Writes Russian B2B cold emails and follow-up sequences that move prospects toward replies, calls, pilots, presentations, and product conversations.
default_prompt: Напиши первое холодное B2B письмо и цепочку follow-up на русском. Сначала уточни цель письма, ожидаемый результат, аудиторию, proof points, ссылки и запретные формулировки.
